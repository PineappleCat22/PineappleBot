<html>
<head>
    <style>
        .media {
            max-width: 100%; 
            max-height: 80%;
            object-fit: contain
        }

        .caption {
            text-align: center;
            height: 20%;
            font-family: 'VCR OSD Mono';
            font-size: 30px;
            margin: 0;
            color: white;
        }

        .container {
            height:500px; 
            width:500px; 
            display:flex; 
            flex-direction:column;
        }

        /* we are getting weird with it */
        #player:not([src]),
        #player[src=""] {
            height: 0;
            display: block;
        }

        #player[src]:not([src=""]) {
            height: auto;
            width: 100%; 
        }
    </style>
</head>
<body>
    <div class="container">
        <video src="" id="player" class="media"></video> 
        <img src="" id="frame" class="media" />
        <div class="caption"><p id="caption" style="background-color: black; width: auto;"></p></div>
        
    </div>
    <script>
    var player = document.getElementById("player"); 
    console.log(player);
    var caption = document.getElementById("caption");
    console.log(caption)
    const es = new EventSource('/events');

    es.onmessage = function (event) {
        const data = JSON.parse(event.data);
        if (data.content == "CONN_TEST") {
            console.log("Successfully connected to event handler.");
        }
        else if (data.content == "media") {
            console.log("Media data recieved!");
            console.log(data.media); //data url
            player.setAttribute("src", data.media);
            player.volume = 0.5;
            console.log(data.caption); //caption
            caption.textContent = data.caption;
            player.play();
        }
    };

    player.addEventListener("ended", (event) => {
        player.setAttribute("src", "");
        caption.textContent = "";
    });
    </script>
</body>
</html>
